name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_call:

jobs:
  # ─── JOB 1: Testes unitários (sem banco) ─────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-for-production

  # ─── JOB 2: Testes de integração (com Postgres real) ─────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: multgestor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/multgestor_test
          NODE_ENV: test

      - name: Create least-privilege runtime role (app_runtime)
        run: |
          psql "$DATABASE_URL" -c "CREATE ROLE app_runtime LOGIN PASSWORD 'app_runtime' NOSUPERUSER NOCREATEDB NOCREATEROLE NOBYPASSRLS INHERIT;" || true
          psql "$DATABASE_URL" -f src/database/runtime_role_grants.sql
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/multgestor_test
          NODE_ENV: test

      - name: Run integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-for-production
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/multgestor_test
          ADMIN_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/multgestor_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/multgestor_test
          APP_RUNTIME_URL: postgresql://app_runtime:app_runtime@localhost:5432/multgestor_test
          REDIS_URL: redis://localhost:6379

  # ─── JOB 3: Frontend lint + build ────────────────────────────────────────
  frontend:
    name: Frontend Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.placeholder.com
