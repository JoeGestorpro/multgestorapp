name: Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.opencodex/**'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - '.github/PULL_REQUEST_TEMPLATE.md'

jobs:
  # ─── Roda CI completo antes de qualquer deploy ───────────────────────────
  ci:
    name: Run CI before deploy
    uses: ./.github/workflows/ci.yml

  # ─── Run Database Migrations ─────────────────────────────────────────────
  run-migrations:
    name: Run Database Migrations
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        # Contencao de hang (debito fix/ci-migrate-hang; causa-raiz DESCONHECIDA).
        # migrate normalmente conclui em <1min; o teto de 3min mata um processo travado.
        # timeout retorna 124 ao exceder -> step falha VISIVELMENTE (nunca sucesso silencioso).
        run: |
          code=0
          timeout --signal=TERM --kill-after=30s 3m npm run migrate || code=$?
          if [ "$code" -eq 124 ] || [ "$code" -eq 137 ]; then
            echo "::error title=migrate-timeout::run-migrations excedeu 3min (exit $code) — possivel hang intermitente; ver fix/ci-migrate-hang."
          fi
          exit $code
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  # ─── Deploy Backend → Render ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    needs: run-migrations
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | \
            grep -q "200\|201" && echo "Deploy triggered" || \
            (echo "Deploy hook failed" && exit 1)

  # ─── Deploy Frontend → Vercel ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Deploy to Vercel
        run: npx vercel --prod --token "${{ secrets.VERCEL_TOKEN }}" --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
