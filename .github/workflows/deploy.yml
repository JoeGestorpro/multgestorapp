name: Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.opencodex/**'
      - '.opencode/**'
      - 'docs/**'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - '.github/PULL_REQUEST_TEMPLATE.md'

jobs:
  # ─── Roda CI completo antes de qualquer deploy ───────────────────────────
  ci:
    name: Run CI before deploy
    uses: ./.github/workflows/ci.yml

  # ─── Migrations: aplicadas pelo Render, NAO por este workflow ─────────────
  # O job `run-migrations` foi REMOVIDO em 2026-07-20 (OPS-MIGRATIONS-03D, GATE 9).
  #
  # Por que existia e por que saiu:
  #   - rodava `npm run migrate` contra a conexao DIRETA do Supabase, que so
  #     expoe IPv6; o runner do GitHub nao alcanca -> ENETUNREACH em 100% das
  #     execucoes, mascarado por `continue-on-error: true`;
  #   - com isso o step era sempre `success`, e o `needs:` de `deploy-backend`
  #     virava uma dependencia DECORATIVA: nunca protegeu nada.
  #
  # Onde as migrations sao aplicadas agora:
  #   Render, no `buildCommand` = `npm install && npm run migrate:prod`.
  #   Gate BLOQUEANTE: migration falha -> build falha -> deploy falha -> a
  #   versao anterior permanece no ar. Modo estrito (`--strict`) recusa o
  #   fallback para DATABASE_URL e exige endpoint de sessao (porta 5432).
  #   Evidencias: .opencodex/brain/plans/OPS-MIGRATIONS-03D-plano.md
  #
  # ATENCAO: o step `Run migrations` do ci.yml NAO foi tocado — ele valida as
  # migrations contra um Postgres efemero em todo PR e deve permanecer.

  # ─── Deploy Backend → Render ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Render)
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | \
            grep -q "200\|201" && echo "Deploy triggered" || \
            (echo "Deploy hook failed" && exit 1)

  # ─── Deploy Frontend → Vercel ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Deploy to Vercel
        run: npx vercel --prod --token "${{ secrets.VERCEL_TOKEN }}" --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
